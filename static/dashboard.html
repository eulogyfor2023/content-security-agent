<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容安全监控仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-primary: #0f1923;
            --bg-card: #1a2736;
            --bg-card-hover: #1e3044;
            --border: #2a3f55;
            --text-primary: #e0e6ed;
            --text-secondary: #8899aa;
            --accent: #00d4aa;
            --accent-red: #ff4757;
            --accent-yellow: #ffa502;
            --accent-blue: #3742fa;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #4dc9f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow);
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-card .sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .value.green { color: var(--accent); }
        .value.yellow { color: var(--accent-yellow); }
        .value.red { color: var(--accent-red); }
        .value.blue { color: var(--accent-blue); }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .chart-card.full {
            grid-column: 1 / -1;
        }

        .chart-card h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .chart-box {
            width: 100%;
            height: 320px;
        }

        .chart-box.tall {
            height: 400px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 4px;
            width: fit-content;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .tab.active {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent);
        }

        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0,212,170,0.3);
        }

        .btn-danger {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .btn-danger:hover {
            background: var(--accent-red);
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover td {
            background: rgba(0,212,170,0.03);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-low { background: rgba(0,212,170,0.15); color: var(--accent); }
        .badge-medium { background: rgba(255,165,2,0.15); color: var(--accent-yellow); }
        .badge-high { background: rgba(255,71,87,0.15); color: var(--accent-red); }
        .badge-critical { background: rgba(255,71,87,0.3); color: #fff; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast-success { background: var(--accent); color: #000; }
        .toast-error { background: var(--accent-red); color: #fff; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .charts-row { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ 内容安全监控仪表盘</h1>
        <div class="header-status">
            <span class="status-dot"></span>
            <span id="headerStatus">系统运行中</span>
        </div>
    </div>

    <div class="container">
        <!-- 概览统计 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">总分析次数</div>
                <div class="value blue" id="statTotal">0</div>
                <div class="sub">累计内容安全分析</div>
            </div>
            <div class="stat-card">
                <div class="label">高风险告警</div>
                <div class="value red" id="statHigh">0</div>
                <div class="sub">需要立即处理</div>
            </div>
            <div class="stat-card">
                <div class="label">中风险关注</div>
                <div class="value yellow" id="statMedium">0</div>
                <div class="sub">需要持续关注</div>
            </div>
            <div class="stat-card">
                <div class="label">待提醒日程</div>
                <div class="value green" id="statSchedules">0</div>
                <div class="sub">即将到期的提醒</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-row">
            <div class="chart-card">
                <h3>📊 风险等级分布</h3>
                <div class="chart-box" id="chartRiskDist"></div>
            </div>
            <div class="chart-card">
                <h3>📈 用户群体风险矩阵</h3>
                <div class="chart-box" id="chartGroupRisk"></div>
            </div>
        </div>

        <!-- 内容分析 + 日程管理 -->
        <div class="section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('analyze')">🔍 内容安全分析</button>
                <button class="tab" onclick="switchTab('schedule')">📅 日程管理</button>
                <button class="tab" onclick="switchTab('alerts')">🚨 告警列表</button>
                <button class="tab" onclick="switchTab('anomaly')">⚡ 异常检测</button>
                <button class="tab" onclick="switchTab('funnel')">📊 漏斗分析</button>
                <button class="tab" onclick="switchTab('report')">📋 报表生成</button>
                <button class="tab" onclick="switchTab('rules')">⚙️ 规则引擎</button>
            </div>

            <!-- 分析面板 -->
            <div id="panelAnalyze" class="form-card">
                <div class="form-row">
                    <div class="form-group">
                        <label>用户群体</label>
                        <select id="analyzeUserGroup">
                            <option value="general">普通用户</option>
                            <option value="vip">VIP 用户</option>
                            <option value="new">新注册用户</option>
                            <option value="high_risk">高风险用户</option>
                            <option value="teenager">青少年用户</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>内容来源</label>
                        <select id="analyzeSource">
                            <option value="comment">评论</option>
                            <option value="post">帖子</option>
                            <option value="chat">聊天</option>
                            <option value="livestream">直播</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:16px;">
                    <label>待分析内容</label>
                    <textarea id="analyzeContent" rows="4" placeholder="请输入需要分析的内容文本..."></textarea>
                </div>
                <div style="display:flex;gap:12px;">
                    <button class="btn btn-primary" onclick="submitAnalysis()">开始分析</button>
                    <button class="btn btn-danger" onclick="loadDemo()">加载示例</button>
                </div>
                <div id="analyzeResult" style="margin-top:16px;display:none;"></div>
            </div>

            <!-- 日程面板 -->
            <div id="panelSchedule" class="form-card" style="display:none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>事件标题 *</label>
                        <input type="text" id="scheduleTitle" placeholder="例如：周度安全审核会议">
                    </div>
                    <div class="form-group">
                        <label>事件时间 *</label>
                        <input type="datetime-local" id="scheduleTime">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>提前提醒（小时）</label>
                        <input type="number" id="scheduleHours" value="6" min="1" max="72">
                    </div>
                    <div class="form-group">
                        <label>事件描述</label>
                        <input type="text" id="scheduleDesc" placeholder="可选描述">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="submitSchedule()">添加日程</button>
                <div style="margin-top: 24px;">
                    <h4 style="margin-bottom:12px; color: var(--text-secondary);">📋 已有日程</h4>
                    <div id="scheduleList"></div>
                </div>
            </div>

            <!-- 告警面板 -->
            <div id="panelAlerts" style="display:none;">
                <div class="chart-card">
                    <div id="alertsTable"></div>
                </div>
            </div>

            <!-- 异常检测面板 -->
            <div id="panelAnomaly" class="form-card" style="display:none;">
                <div style="display:flex;gap:12px;margin-bottom:16px;align-items:end;">
                    <div class="form-group">
                        <label>检测时间窗口</label>
                        <select id="anomalyHours">
                            <option value="6">最近 6 小时</option>
                            <option value="12">最近 12 小时</option>
                            <option value="24" selected>最近 24 小时</option>
                            <option value="48">最近 48 小时</option>
                            <option value="72">最近 3 天</option>
                            <option value="168">最近 7 天</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="detectAnomalies()">执行检测</button>
                </div>
                <div id="anomalyResult"></div>
            </div>

            <!-- 漏斗分析面板 -->
            <div id="panelFunnel" class="form-card" style="display:none;">
                <div style="display:flex;gap:12px;margin-bottom:16px;align-items:end;">
                    <div class="form-group">
                        <label>分析周期</label>
                        <select id="funnelDays">
                            <option value="7">最近 7 天</option>
                            <option value="30" selected>最近 30 天</option>
                            <option value="90">最近 90 天</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="loadFunnel()">加载漏斗</button>
                    <button class="btn btn-primary" onclick="loadRetention()">留存分析</button>
                    <button class="btn btn-primary" onclick="loadBehavior()">行为分析</button>
                </div>
                <div class="charts-row">
                    <div class="chart-card" style="grid-column:1/-1;">
                        <h3>📊 用户行为漏斗</h3>
                        <div class="chart-box" id="chartFunnel"></div>
                    </div>
                </div>
                <div id="funnelDetail"></div>
            </div>

            <!-- 报表生成面板 -->
            <div id="panelReport" class="form-card" style="display:none;">
                <div style="display:flex;gap:12px;margin-bottom:16px;align-items:end;">
                    <div class="form-group">
                        <label>报表类型</label>
                        <select id="reportType">
                            <option value="daily">日报</option>
                            <option value="weekly">周报</option>
                            <option value="monthly">月报</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateReport()">生成报表</button>
                    <button class="btn btn-primary" onclick="generateAndSendReport()">生成并发送微信</button>
                </div>
                <div id="reportResult" style="max-height:600px;overflow-y:auto;"></div>
            </div>

            <!-- 规则引擎面板 -->
            <div id="panelRules" class="form-card" style="display:none;">
                <div style="display:flex;gap:12px;margin-bottom:16px;align-items:end;">
                    <button class="btn btn-primary" onclick="loadRules()">刷新规则</button>
                    <button class="btn btn-primary" onclick="loadRuleLogs()">查看日志</button>
                </div>
                <div id="rulesStats" style="margin-bottom:16px;"></div>
                <div id="rulesTable"></div>
            </div>
        </div>

        <!-- 最近分析记录 -->
        <div class="section">
            <div class="section-title">📋 最近分析记录</div>
            <div class="chart-card">
                <div id="recentTable"></div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const API = '';

        let riskChart, groupChart;

        function initCharts() {
            riskChart = echarts.init(document.getElementById('chartRiskDist'));
            groupChart = echarts.init(document.getElementById('chartGroupRisk'));
            window.addEventListener('resize', () => {
                riskChart?.resize();
                groupChart?.resize();
            });
        }

        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            const panels = ['analyze', 'schedule', 'alerts', 'anomaly', 'funnel', 'report', 'rules'];
            panels.forEach(p => {
                document.getElementById('panel' + p.charAt(0).toUpperCase() + p.slice(1)).style.display = p === tab ? 'block' : 'none';
            });
            if (tab === 'alerts') loadAlerts();
            if (tab === 'schedule') loadSchedules();
            if (tab === 'anomaly') detectAnomalies();
            if (tab === 'funnel') loadFunnel();
            if (tab === 'rules') loadRules();
        }

        async function submitAnalysis() {
            const content = document.getElementById('analyzeContent').value.trim();
            if (!content) return toast('请输入分析内容', 'error');

            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '分析中...';

            try {
                const resp = await fetch(`${API}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: content,
                        user_group: document.getElementById('analyzeUserGroup').value,
                        source: document.getElementById('analyzeSource').value,
                    }),
                });

                if (!resp.ok) {
                    let errMsg = '';
                    try {
                        const errData = await resp.json();
                        errMsg = errData.detail || JSON.stringify(errData);
                    } catch {
                        errMsg = resp.status === 401
                            ? 'API Key 无效或未配置，请在 .env 文件中填写正确的 OPENAI_API_KEY'
                            : '服务器错误 (HTTP ' + resp.status + ')';
                    }
                    throw new Error(errMsg);
                }

                const data = await resp.json();

                const badgeClass = `badge-${data.risk_level}`;
                const resultDiv = document.getElementById('analyzeResult');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<div style="background:var(--bg-primary);border-radius:8px;padding:16px;border:1px solid var(--border);">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                            <span class="badge ${badgeClass}">${data.risk_level.toUpperCase()}</span>
                            <span style="font-size:24px;font-weight:700;">${data.risk_score}分</span>
                        </div>
                        <p style="margin-bottom:8px;color:var(--text-secondary);">📝 ${data.summary}</p>
                        <p style="margin-bottom:8px;color:var(--accent);">💡 ${data.strategy}</p>
                        <div style="display:flex;gap:6px;flex-wrap:wrap;">
                            ${(data.tags||[]).map(t => `<span style="background:rgba(77,201,246,0.15);color:#4dc9f6;padding:2px 10px;border-radius:12px;font-size:11px;">${t}</span>`).join('')}
                        </div>
                        ${data.triggered_rules && data.triggered_rules.length > 0 ? `
                        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
                            <span style="font-size:12px;color:var(--text-secondary);">⚙️ 触发规则: </span>
                            ${data.triggered_rules.map(r => `<span style="background:rgba(255,165,2,0.15);color:#ffa502;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:4px;">${r.name}</span>`).join('')}
                        </div>` : ''}
                    </div>`;
                toast('分析完成！');
                refreshDashboard();
            } catch (e) {
                toast('分析失败：' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '开始分析';
            }
        }

        function loadDemo() {
            document.getElementById('analyzeContent').value = '这个产品太垃圾了，大家千万别买，我这里有更好的渠道，加我微信 xxx123456，保证比官方便宜一半！';
            document.getElementById('analyzeUserGroup').value = 'general';
            document.getElementById('analyzeSource').value = 'comment';
        }

        async function submitSchedule() {
            const title = document.getElementById('scheduleTitle').value.trim();
            const time = document.getElementById('scheduleTime').value;
            const hours = parseInt(document.getElementById('scheduleHours').value) || 6;
            const desc = document.getElementById('scheduleDesc').value.trim();

            if (!title) return toast('请输入事件标题', 'error');
            if (!time) return toast('请选择事件时间', 'error');

            try {
                const resp = await fetch(`${API}/api/schedule`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        event_time: new Date(time).toISOString(),
                        notify_before_hours: hours,
                        description: desc || null,
                    }),
                });
                await resp.json();
                toast('日程已添加，将在事件前 ' + hours + ' 小时通过微信提醒你！');
                document.getElementById('scheduleTitle').value = '';
                document.getElementById('scheduleTime').value = '';
                document.getElementById('scheduleDesc').value = '';
                loadSchedules();
                refreshDashboard();
            } catch (e) {
                toast('添加失败：' + e.message, 'error');
            }
        }

        async function loadSchedules() {
            try {
                const resp = await fetch(`${API}/api/schedules`);
                const data = await resp.json();
                const container = document.getElementById('scheduleList');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无日程</p></div>';
                    return;
                }
                container.innerHTML = `
                    <table>
                        <thead><tr><th>标题</th><th>时间</th><th>提前</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody>
                            ${data.map(s => `
                                <tr>
                                    <td><strong>${s.title}</strong>${s.description ? '<br><span style="color:var(--text-secondary);font-size:12px;">'+s.description+'</span>' : ''}</td>
                                    <td>${new Date(s.event_time).toLocaleString('zh-CN')}</td>
                                    <td>${s.notify_before_hours}h</td>
                                    <td><span class="badge ${s.notified ? 'badge-low' : 'badge-medium'}">${s.notified ? '已提醒' : '待提醒'}</span></td>
                                    <td><button class="btn btn-danger" style="padding:4px 12px;font-size:12px;" onclick="deleteSchedule(${s.id})">删除</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('确认删除此日程？')) return;
            try {
                await fetch(`${API}/api/schedule/${id}`, { method: 'DELETE' });
                toast('已删除');
                loadSchedules();
                refreshDashboard();
            } catch (e) {
                toast('删除失败', 'error');
            }
        }

        async function loadAlerts() {
            try {
                const resp = await fetch(`${API}/api/alerts`);
                const data = await resp.json();
                const container = document.getElementById('alertsTable');
                if (data.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>暂无告警</p></div>';
                    return;
                }
                container.innerHTML = `
                    <table>
                        <thead><tr><th>时间</th><th>标题</th><th>内容</th><th>级别</th><th>来源</th></tr></thead>
                        <tbody>
                            ${data.map(a => `
                                <tr>
                                    <td>${new Date(a.created_at).toLocaleString('zh-CN')}</td>
                                    <td>${a.title}</td>
                                    <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a.content}</td>
                                    <td><span class="badge badge-${a.level}">${a.level}</span></td>
                                    <td>${a.source}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                console.error(e);
            }
        }

        async function refreshDashboard() {
            try {
                const resp = await fetch(`${API}/api/dashboard`);
                const data = await resp.json();

                document.getElementById('statTotal').textContent = data.total_analyses || 0;
                document.getElementById('statHigh').textContent = (data.risk_distribution?.high || 0) + (data.risk_distribution?.critical || 0);
                document.getElementById('statMedium').textContent = data.risk_distribution?.medium || 0;
                document.getElementById('statSchedules').textContent = (data.upcoming_schedules || []).length;

                const dist = data.risk_distribution || {};
                riskChart.setOption({
                    tooltip: { trigger: 'item' },
                    legend: { bottom: 0, textStyle: { color: '#8899aa' } },
                    series: [{
                        type: 'pie',
                        radius: ['45%', '75%'],
                        center: ['50%', '45%'],
                        label: { color: '#8899aa' },
                        emphasis: { label: { fontSize: 18, fontWeight: 'bold' } },
                        data: [
                            { value: dist.low || 0, name: '低风险', itemStyle: { color: '#00d4aa' } },
                            { value: dist.medium || 0, name: '中风险', itemStyle: { color: '#ffa502' } },
                            { value: dist.high || 0, name: '高风险', itemStyle: { color: '#ff4757' } },
                            { value: dist.critical || 0, name: '严重', itemStyle: { color: '#ff0000' } },
                        ].filter(d => d.value > 0),
                    }],
                });

                const groups = data.user_group_risks || [];
                const groupNames = [...new Set(groups.map(g => g.user_group))];
                const riskLevels = ['low', 'medium', 'high', 'critical'];
                const colors = { low: '#00d4aa', medium: '#ffa502', high: '#ff4757', critical: '#ff0000' };

                groupChart.setOption({
                    tooltip: { trigger: 'axis' },
                    legend: { data: riskLevels, bottom: 0, textStyle: { color: '#8899aa' } },
                    grid: { left: '3%', right: '4%', bottom: '12%', top: '10%', containLabel: true },
                    xAxis: { type: 'category', data: groupNames, axisLabel: { color: '#8899aa' } },
                    yAxis: { type: 'value', axisLabel: { color: '#8899aa' }, splitLine: { lineStyle: { color: '#2a3f55' } } },
                    series: riskLevels.map(level => ({
                        name: level,
                        type: 'bar',
                        stack: 'total',
                        emphasis: { focus: 'series' },
                        itemStyle: { color: colors[level] },
                        data: groupNames.map(g => {
                            const found = groups.find(r => r.user_group === g && r.risk_level === level);
                            return found ? found.c : 0;
                        }),
                    })),
                });

                const recent = data.recent_alerts || [];
                const recentTable = document.getElementById('recentTable');
                if (recent.length === 0) {
                    recentTable.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无分析记录，快去分析第一条内容吧！</p></div>';
                } else {
                    recentTable.innerHTML = `
                        <table>
                            <thead><tr><th>时间</th><th>用户群体</th><th>来源</th><th>风险等级</th><th>评分</th><th>摘要</th></tr></thead>
                            <tbody>
                                ${recent.map(r => `
                                    <tr>
                                        <td>${new Date(r.created_at).toLocaleString('zh-CN')}</td>
                                        <td>${r.user_group}</td>
                                        <td>${r.source}</td>
                                        <td><span class="badge badge-${r.risk_level}">${r.risk_level}</span></td>
                                        <td>${r.risk_score}</td>
                                        <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.summary || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (e) {
                console.error('刷新仪表盘失败:', e);
            }
        }

        let funnelChart;

        async function detectAnomalies() {
            const hours = document.getElementById('anomalyHours').value;
            const container = document.getElementById('anomalyResult');
            container.innerHTML = '<p style="color:var(--text-secondary);">检测中...</p>';
            try {
                const resp = await fetch(`${API}/api/anomaly/detect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hours: parseInt(hours) }),
                });
                const data = await resp.json();
                const s = data.stats;
                const spikes = data.risk_spikes;

                const levelColors = { critical: '#ff0000', high: '#ff4757', medium: '#ffa502', low: '#00d4aa', normal: '#00d4aa' };
                const levelLabels = { critical: '严重异常', high: '高风险', medium: '中等', low: '低风险', normal: '正常' };

                let html = `<div style="background:var(--bg-primary);border-radius:8px;padding:16px;border:1px solid ${levelColors[s.overall_level] || 'var(--border)'};margin-bottom:16px;">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                        <span class="badge badge-${s.overall_level === 'normal' ? 'low' : s.overall_level === 'critical' ? 'critical' : s.overall_level}">
                            ${levelLabels[s.overall_level] || s.overall_level}
                        </span>
                        <span style="font-size:16px;font-weight:600;">${s.summary}</span>
                    </div>
                    <p style="color:var(--text-secondary);font-size:13px;">
                        检测窗口: ${s.total_hours}小时 | 均值: ${s.mean_per_hour}条/小时 | 标准差: ${s.std_per_hour}
                    </p>
                </div>`;

                if (s.anomalies && s.anomalies.length > 0) {
                    html += `<table><thead><tr><th>时间</th><th>数量</th><th>类型</th><th>Z-Score</th><th>严重度</th><th>说明</th></tr></thead><tbody>`;
                    s.anomalies.forEach(a => {
                        html += `<tr>
                            <td>${a.hour}</td>
                            <td><strong>${a.count}</strong></td>
                            <td>${a.type === 'spike' ? '📈 突增' : a.type === 'drop' ? '📉 下降' : '⚡ 激增'}</td>
                            <td>${a.z_score || '-'}</td>
                            <td><span class="badge badge-${a.severity}">${a.severity}</span></td>
                            <td style="font-size:12px;">${a.message}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                } else {
                    html += '<div class="empty-state"><div class="icon">✅</div><p>未检测到异常</p></div>';
                }

                html += `<div style="margin-top:16px;padding:16px;background:var(--bg-primary);border-radius:8px;border:1px solid var(--border);">
                    <h4 style="margin-bottom:8px;">🔴 高风险内容聚集</h4>
                    <p style="color:var(--text-secondary);">${spikes.summary}</p>
                    ${spikes.spikes && spikes.spikes.length > 0 ? '<table style="margin-top:8px;"><thead><tr><th>时段</th><th>数量</th></tr></thead><tbody>' + spikes.spikes.map(s => `<tr><td>${s.hour}</td><td>${s.count}</td></tr>`).join('') + '</tbody></table>' : ''}
                </div>`;

                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<p style="color:var(--accent-red);">检测失败: ${e.message}</p>`;
            }
        }

        async function loadFunnel() {
            const days = document.getElementById('funnelDays').value;
            try {
                const resp = await fetch(`${API}/api/funnel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ days: parseInt(days) }),
                });
                const data = await resp.json();

                if (!funnelChart) {
                    funnelChart = echarts.init(document.getElementById('chartFunnel'));
                }

                const funnelData = data.funnel || [];
                funnelChart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c}人 ({d}%)' },
                    series: [{
                        type: 'funnel',
                        left: '10%',
                        right: '10%',
                        top: 20,
                        bottom: 20,
                        width: '60%',
                        sort: 'descending',
                        gap: 2,
                        label: { show: true, position: 'inside', fontSize: 14 },
                        labelLine: { length: 10, lineStyle: { width: 1 } },
                        data: funnelData.map(f => ({
                            name: f.name,
                            value: f.count,
                        })),
                        itemStyle: {
                            borderColor: '#0f1923',
                            borderWidth: 1,
                        },
                    }],
                    color: ['#4dc9f6', '#00d4aa', '#ffa502', '#ff4757'],
                });

                const groups = data.group_breakdown || [];
                let html = `<div style="margin-top:16px;">
                    <h4 style="margin-bottom:8px;">📊 各群体转化详情 (总转化率: ${data.overall_conversion}%)</h4>
                    <table><thead><tr><th>群体</th><th>注册</th><th>激活</th><th>留存</th><th>活跃</th><th>转化率</th></tr></thead><tbody>`;
                groups.forEach(g => {
                    html += `<tr>
                        <td>${g.group}</td><td>${g.registered}</td><td>${g.activated}</td>
                        <td>${g.retained}</td><td>${g.active}</td>
                        <td><span class="badge ${g.conversion_rate > 20 ? 'badge-low' : 'badge-medium'}">${g.conversion_rate}%</span></td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                document.getElementById('funnelDetail').innerHTML = html;
            } catch (e) {
                toast('加载失败: ' + e.message, 'error');
            }
        }

        async function loadRetention() {
            try {
                const resp = await fetch(`${API}/api/retention?days=30`);
                const data = await resp.json();
                const items = data.retention || [];
                let html = `<div style="margin-top:16px;">
                    <h4 style="margin-bottom:8px;">📆 各群体留存率</h4>
                    <div style="margin-bottom:8px;color:var(--text-secondary);">${data.summary}</div>
                    <table><thead><tr><th>群体</th><th>总用户</th><th>次日留存</th><th>7日留存</th><th>30日留存</th><th>生命周期</th></tr></thead><tbody>`;
                items.forEach(r => {
                    html += `<tr>
                        <td>${r.group}</td><td>${r.total}</td>
                        <td><span class="badge ${r.day1_rate > 60 ? 'badge-low' : 'badge-medium'}">${r.day1_rate}%</span></td>
                        <td><span class="badge ${r.day7_rate > 40 ? 'badge-low' : 'badge-medium'}">${r.day7_rate}%</span></td>
                        <td><span class="badge ${r.day30_rate > 20 ? 'badge-low' : 'badge-high'}">${r.day30_rate}%</span></td>
                        <td>${r.lifespan_days}天</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                document.getElementById('funnelDetail').innerHTML = html;
            } catch (e) {
                toast('加载失败: ' + e.message, 'error');
            }
        }

        async function loadBehavior() {
            try {
                const resp = await fetch(`${API}/api/user-behavior?days=30`);
                const data = await resp.json();
                const behaviors = data.behaviors || [];
                let html = `<div style="margin-top:16px;">
                    <h4 style="margin-bottom:8px;">👤 用户行为概览</h4>
                    <p style="color:var(--text-secondary);margin-bottom:12px;">${data.summary}</p>
                    <table><thead><tr><th>群体</th><th>行为总数</th><th>主要渠道</th><th>渠道占比</th><th>风险画像</th></tr></thead><tbody>`;
                behaviors.forEach(b => {
                    html += `<tr>
                        <td>${b.group}</td><td>${b.total_actions}</td><td>${b.top_source}</td>
                        <td>${b.top_source_count}次</td>
                        <td><span class="badge ${b.risk_profile === '正常' ? 'badge-low' : 'badge-high'}">${b.risk_profile}</span></td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                document.getElementById('funnelDetail').innerHTML = html;
            } catch (e) {
                toast('加载失败: ' + e.message, 'error');
            }
        }

        async function generateReport() {
            const type = document.getElementById('reportType').value;
            const container = document.getElementById('reportResult');
            container.innerHTML = '<p style="color:var(--text-secondary);">AI 正在生成报表...</p>';
            try {
                const resp = await fetch(`${API}/api/report/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ report_type: type }),
                });
                const data = await resp.json();
                const stats = data.quick_stats || {};
                let html = `<div style="background:var(--bg-primary);border-radius:8px;padding:16px;border:1px solid var(--border);margin-bottom:16px;">
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;">
                        <div><span style="color:var(--text-secondary);">今日分析</span><br><strong style="font-size:20px;">${stats.today_total || 0}</strong></div>
                        <div><span style="color:var(--text-secondary);">高风险</span><br><strong style="font-size:20px;color:var(--accent-red);">${stats.today_high_risk || 0}</strong></div>
                        <div><span style="color:var(--text-secondary);">今日告警</span><br><strong style="font-size:20px;color:var(--accent-yellow);">${stats.today_alerts || 0}</strong></div>
                        <div><span style="color:var(--text-secondary);">待提醒</span><br><strong style="font-size:20px;color:var(--accent);">${stats.pending_schedules || 0}</strong></div>
                    </div>
                </div>`;
                html += `<pre style="background:var(--bg-primary);border-radius:8px;padding:20px;border:1px solid var(--border);white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--text-primary);">${data.report_text || '无数据'}</pre>`;
                container.innerHTML = html;
                toast('报表生成完成！');
            } catch (e) {
                container.innerHTML = `<p style="color:var(--accent-red);">生成失败: ${e.message}</p>`;
            }
        }

        async function generateAndSendReport() {
            const type = document.getElementById('reportType').value;
            const container = document.getElementById('reportResult');
            const typeLabels = { daily: '日报', weekly: '周报', monthly: '月报' };
            container.innerHTML = `<p style="color:var(--text-secondary);">AI 正在生成${typeLabels[type]}并发送到微信...</p>`;
            try {
                const resp = await fetch(`${API}/api/report/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ report_type: type }),
                });
                const data = await resp.json();
                if (data.success) {
                    toast(`${typeLabels[type]}已生成并发送到微信！`);
                } else {
                    toast('微信发送失败，请检查 ServerChan 配置', 'error');
                }
                if (data.report_text) {
                    container.innerHTML = `<pre style="background:var(--bg-primary);border-radius:8px;padding:20px;border:1px solid var(--border);white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--text-primary);">${data.report_text}</pre>`;
                }
            } catch (e) {
                container.innerHTML = `<p style="color:var(--accent-red);">发送失败: ${e.message}</p>`;
            }
        }

        async function loadRules() {
            try {
                const resp = await fetch(`${API}/api/rules`);
                const data = await resp.json();
                const stats = data.stats || {};
                document.getElementById('rulesStats').innerHTML = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
                    <div class="stat-card"><div class="label">规则总数</div><div class="value blue" style="font-size:24px;">${stats.total_rules || 0}</div></div>
                    <div class="stat-card"><div class="label">已启用</div><div class="value green" style="font-size:24px;">${stats.enabled_rules || 0}</div></div>
                    <div class="stat-card"><div class="label">总执行</div><div class="value yellow" style="font-size:24px;">${stats.total_executions || 0}</div></div>
                    <div class="stat-card"><div class="label">今日执行</div><div class="value blue" style="font-size:24px;">${stats.today_executions || 0}</div></div>
                </div>`;

                const rules = data.rules || [];
                document.getElementById('rulesTable').innerHTML = `
                    <table>
                        <thead><tr><th>规则ID</th><th>名称</th><th>条件</th><th>动作</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody>
                            ${rules.map(r => `
                                <tr>
                                    <td style="font-size:11px;">${r.rule_id}</td>
                                    <td>${r.name}</td>
                                    <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;">${r.condition}</td>
                                    <td><span class="badge badge-medium">${r.action}</span></td>
                                    <td><span class="badge ${r.enabled ? 'badge-low' : 'badge-high'}">${r.enabled ? '启用' : '禁用'}</span></td>
                                    <td><button class="btn ${r.enabled ? 'btn-danger' : 'btn-primary'}" style="padding:4px 12px;font-size:12px;" onclick="toggleRule('${r.rule_id}', ${!r.enabled})">${r.enabled ? '禁用' : '启用'}</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                toast('加载失败: ' + e.message, 'error');
            }
        }

        async function toggleRule(ruleId, enabled) {
            try {
                const resp = await fetch(`${API}/api/rules/toggle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rule_id: ruleId, enabled: enabled }),
                });
                await resp.json();
                toast(`规则已${enabled ? '启用' : '禁用'}`);
                loadRules();
            } catch (e) {
                toast('操作失败: ' + e.message, 'error');
            }
        }

        async function loadRuleLogs() {
            try {
                const resp = await fetch(`${API}/api/rules/logs?limit=30`);
                const data = await resp.json();
                const logs = data.logs || [];
                document.getElementById('rulesTable').innerHTML = `
                    <h4 style="margin-bottom:8px;">📜 最近执行日志</h4>
                    <table>
                        <thead><tr><th>时间</th><th>规则ID</th><th>动作</th><th>结果</th><th>详情</th></tr></thead>
                        <tbody>
                            ${logs.map(l => `
                                <tr>
                                    <td>${new Date(l.executed_at).toLocaleString('zh-CN')}</td>
                                    <td>${l.rule_id}</td>
                                    <td>${l.action}</td>
                                    <td><span class="badge ${l.result === 'triggered' ? 'badge-low' : 'badge-medium'}">${l.result}</span></td>
                                    <td style="font-size:12px;">${l.detail}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                toast('加载失败: ' + e.message, 'error');
            }
        }

        initCharts();
        refreshDashboard();
        setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
